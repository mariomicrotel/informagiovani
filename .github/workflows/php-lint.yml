name: PHP lint

on:
  push:
    branches: [main]
    paths:
      - 'plugin/**/*.php'
      - '.github/workflows/php-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugin/**/*.php'

permissions:
  contents: read

jobs:
  syntax:
    name: php -l (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Syntax check all plugin PHP files
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            out=$(php -l "$f" 2>&1) || { echo "::error file=$f::$out"; fail=1; }
          done < <(find plugin/ig-enna -type f -name '*.php')
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All PHP files OK."

  wpcs:
    name: WordPress Coding Standards (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr
          coverage: none

      - name: Install PHPCS + WordPress standards
        run: |
          composer global require --dev \
            squizlabs/php_codesniffer:^3.10 \
            wp-coding-standards/wpcs:^3.1 \
            phpcsstandards/phpcsutils:^1.0 \
            phpcsstandards/phpcsextra:^1.2
          export PATH="$PATH:$HOME/.composer/vendor/bin:$HOME/.config/composer/vendor/bin"
          phpcs --config-set installed_paths "$HOME/.config/composer/vendor/wp-coding-standards/wpcs,$HOME/.config/composer/vendor/phpcsstandards/phpcsutils,$HOME/.config/composer/vendor/phpcsstandards/phpcsextra"

      - name: Run PHPCS (WordPress standard)
        run: |
          export PATH="$PATH:$HOME/.config/composer/vendor/bin"
          phpcs --standard=WordPress --report=summary plugin/ig-enna || true
