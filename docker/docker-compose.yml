services:
  db:
    image: mysql:8.0
    container_name: igenna_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - igenna_db_data:/var/lib/mysql
    networks:
      - igenna_net

  wp:
    image: wordpress:6-php8.2-apache
    container_name: igenna_wp
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8092:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASS}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
    volumes:
      - igenna_wp_data:/var/www/html
      - ../plugin/ig-enna:/var/www/html/wp-content/plugins/ig-enna
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    networks:
      - igenna_net

  pma:
    image: phpmyadmin:latest
    container_name: igenna_pma
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8093:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    networks:
      - igenna_net

volumes:
  igenna_db_data:
  igenna_wp_data:

networks:
  igenna_net:
    driver: bridge
